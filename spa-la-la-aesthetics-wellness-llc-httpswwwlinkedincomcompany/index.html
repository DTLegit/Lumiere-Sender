<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="business-slug" content="spa-la-la-aesthetics-wellness-llc-httpswwwlinkedincomcompany">
    <title>Spa La La Aesthetics & Wellness, LLC. - Personalized Aesthetic Consultation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600;700&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-cream: #f8f6f0;
            --warm-gold: #d4af37;
            --soft-champagne: #f7e7ce;
            --elegant-taupe: #c8b8a8;
            --deep-charcoal: #2c2c2c;
            --soft-white: #fefefe;
            --warm-beige: #f5f1ec;
            --accent-rose: #d4a574;
        }

        body {
            font-family: 'Lato', sans-serif;
            line-height: 1.6;
            color: var(--deep-charcoal);
            background: linear-gradient(135deg, var(--primary-cream) 0%, var(--warm-beige) 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            position: relative;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--deep-charcoal);
            text-decoration: none;
        }

        .contact-info {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--deep-charcoal);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .contact-item:hover {
            color: var(--warm-gold);
        }

        /* Hero Section */
        .hero {
            padding: 80px 0;
            text-align: center;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="1" fill="%23d4af37" opacity="0.1"/></svg>') repeat;
            background-size: 50px 50px;
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 300;
            color: var(--deep-charcoal);
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .hero-subtitle {
            font-size: 1.3rem;
            color: var(--elegant-taupe);
            margin-bottom: 40px;
            font-weight: 300;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .meet-sage-btn {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(135deg, var(--warm-gold) 0%, var(--accent-rose) 100%);
            color: white;
            padding: 18px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        }

        .meet-sage-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(212, 175, 55, 0.4);
        }

        /* Chat Interface */
        .chat-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-container {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
        }

        .chat-header {
            background: linear-gradient(135deg, var(--warm-gold) 0%, var(--accent-rose) 100%);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .close-chat {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .close-chat:hover {
            background: rgba(255,255,255,0.2);
        }

        .chat-body {
            padding: 30px;
            max-height: 500px;
            overflow-y: auto;
        }

        .sage-message {
            background: var(--soft-champagne);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-size: 1rem;
            line-height: 1.6;
        }

        /* Photo Upload Section */
        .photo-upload {
            margin-bottom: 30px;
        }

        .upload-instruction {
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--deep-charcoal);
        }

        .upload-area {
            border: 2px dashed var(--elegant-taupe);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--soft-white);
        }

        .upload-area:hover {
            border-color: var(--warm-gold);
            background: var(--soft-champagne);
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-text {
            color: var(--elegant-taupe);
            font-size: 0.95rem;
        }

        /* Lead Form */
        .lead-form {
            display: grid;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--deep-charcoal);
        }

        .form-group input {
            padding: 12px 15px;
            border: 2px solid var(--elegant-taupe);
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            background: var(--soft-white);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--warm-gold);
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--warm-gold) 0%, var(--accent-rose) 100%);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Features Section */
        .features {
            padding: 80px 0;
            background: rgba(255, 255, 255, 0.7);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }

        .feature-card {
            text-align: center;
            padding: 40px 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
        }

        .feature-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--warm-gold) 0%, var(--accent-rose) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            color: white;
        }

        .feature-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--deep-charcoal);
        }

        .feature-description {
            color: var(--elegant-taupe);
            line-height: 1.6;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 300;
            text-align: center;
            color: var(--deep-charcoal);
            margin-bottom: 20px;
        }

        .section-subtitle {
            text-align: center;
            color: var(--elegant-taupe);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Footer */
        footer {
            background: var(--deep-charcoal);
            color: var(--soft-white);
            padding: 40px 0;
            text-align: center;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .social-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .social-links a {
            color: var(--soft-white);
            text-decoration: none;
            padding: 10px 15px;
            border: 1px solid var(--elegant-taupe);
            border-radius: 25px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .social-links a:hover {
            border-color: var(--warm-gold);
            color: var(--warm-gold);
        }

        .footer-info {
            font-size: 0.9rem;
            color: var(--elegant-taupe);
        }

        /* Success Message */
        .success-message {
            display: none;
            background: var(--soft-champagne);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            color: var(--deep-charcoal);
            margin-top: 20px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 20px;
            }

            .contact-info {
                gap: 20px;
            }

            .hero {
                padding: 60px 0;
            }

            .features {
                padding: 60px 0;
            }

            .features-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .chat-container {
                margin: 20px;
                max-height: calc(100vh - 40px);
            }

            .chat-body {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 15px;
            }

            .hero {
                padding: 40px 0;
            }

            .meet-sage-btn {
                padding: 15px 30px;
                font-size: 1rem;
            }

            .feature-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
